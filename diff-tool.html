<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 Diff 검증 툴</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: #0f1117; color: #e0e0e0; min-height: 100vh;
  }
  .header {
    background: #161822; border-bottom: 1px solid #2a2d3a;
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
  }
  .header h1 {
    font-size: 1.3rem; font-weight: 700;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { font-size: 0.85rem; color: #666; }
  .main { padding: 16px; max-width: 1600px; margin: 0 auto; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .panel { background: #161822; border: 1px solid #2a2d3a; border-radius: 10px; overflow: hidden; }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: #1c1f2e; border-bottom: 1px solid #2a2d3a;
  }
  .panel-head .lbl { font-weight: 700; font-size: 0.92rem; }
  .panel-head .badge { font-size: 0.72rem; padding: 2px 10px; border-radius: 12px; background: #2a2d3a; color: #888; }
  .panel-body { padding: 12px; }
  textarea {
    width: 100%; height: 360px; background: #0f1117; border: 1px solid #2a2d3a;
    border-radius: 8px; color: #e0e0e0; font-family: 'Consolas','D2Coding',monospace;
    font-size: 0.8rem; padding: 12px; resize: vertical; outline: none;
    transition: border-color .2s; line-height: 1.5;
  }
  textarea:focus { border-color: #667eea; }
  textarea::placeholder { color: #444; }
  .drop-zone {
    border: 2px dashed #2a2d3a; border-radius: 8px; padding: 18px;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 8px;
  }
  .drop-zone:hover { border-color: #667eea; background: rgba(102,126,234,.05); }
  .drop-zone.dragover { border-color: #667eea; background: rgba(102,126,234,.1); }
  .drop-zone .icon { font-size: 1.4rem; color: #555; margin-bottom: 4px; }
  .drop-zone .txt { font-size: 0.82rem; color: #666; }
  input[type="file"] { display: none; }
  .flist { max-height: 180px; overflow-y: auto; margin-bottom: 6px; }
  .flist:empty { display: none; }
  .fitem {
    display: flex; align-items: center; gap: 8px; padding: 4px 10px;
    background: #1c1f2e; border: 1px solid #2a2d3a; border-radius: 6px;
    margin-bottom: 3px; font-size: 0.76rem;
  }
  .fitem .fn { color: #667eea; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fitem .fs { color: #555; font-size: 0.7rem; }
  .fitem .fx { background: none; border: none; color: #555; cursor: pointer; font-size: 0.85rem; padding: 0 3px; transition: color .15s; }
  .fitem .fx:hover { color: #f87171; }
  .fcnt { font-size: 0.7rem; color: #667eea; margin-top: 2px; }

  .action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .btn { padding: 10px 28px; font-size: 0.95rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: transform .15s, box-shadow .15s; }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-go { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; box-shadow: 0 4px 15px rgba(102,126,234,.3); }
  .btn-go:hover { box-shadow: 0 6px 20px rgba(102,126,234,.4); }
  .btn-reset { background: #2a2d3a; color: #ccc; }
  .btn-reset:hover { background: #353849; }

  .summary { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .scard { background: #161822; border: 1px solid #2a2d3a; border-radius: 10px; padding: 12px 20px; min-width: 120px; text-align: center; }
  .scard .sv { font-size: 1.5rem; font-weight: 800; }
  .scard .sl { font-size: 0.76rem; color: #888; margin-top: 2px; }
  .c-total .sv { color: #c084fc; }
  .c-match .sv { color: #4ade80; }
  .c-diff .sv { color: #f87171; }
  .c-miss .sv { color: #fbbf24; }

  .filters { display: flex; gap: 6px; margin-bottom: 14px; }
  .fbtn { padding: 5px 14px; font-size: 0.76rem; border: 1px solid #2a2d3a; border-radius: 6px; background: transparent; color: #888; cursor: pointer; transition: all .15s; }
  .fbtn:hover { border-color: #667eea; color: #667eea; }
  .fbtn.on { background: #667eea; color: #fff; border-color: #667eea; }

  /* ── Parsed preview ── */
  .parsed-preview {
    background: #161822; border: 1px solid #2a2d3a; border-radius: 10px;
    margin-bottom: 16px; overflow: hidden;
  }
  .parsed-head {
    padding: 8px 16px; background: #1c1f2e; border-bottom: 1px solid #2a2d3a;
    font-size: 0.82rem; font-weight: 700; cursor: pointer; user-select: none;
    display: flex; align-items: center; justify-content: space-between;
  }
  .parsed-head:hover { background: #222540; }
  .parsed-body { padding: 8px 16px; max-height: 200px; overflow-y: auto; font-size: 0.76rem; font-family: 'Consolas',monospace; }
  .parsed-body.collapsed { display: none; }
  .parsed-row { padding: 3px 0; border-bottom: 1px solid #1a1d2a; display: flex; gap: 12px; }
  .parsed-row .pid { color: #667eea; font-weight: 600; min-width: 280px; }
  .parsed-row .psch { color: #fbbf24; }

  /* ── Result Table ── */
  .rtable-wrap { background: #161822; border: 1px solid #2a2d3a; border-radius: 10px; overflow: hidden; }
  .rtable-scroll { overflow-x: auto; max-height: 640px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; font-family: 'Consolas','D2Coding',monospace; }
  thead { position: sticky; top: 0; z-index: 10; }
  th { background: #1c1f2e; padding: 9px 12px; text-align: left; font-weight: 600; color: #999; border-bottom: 2px solid #2a2d3a; white-space: nowrap; }
  td { padding: 7px 12px; border-bottom: 1px solid #1e2030; white-space: nowrap; }
  tr:hover td { background: rgba(102,126,234,.04); }
  tr.r-match td:first-child { border-left: 3px solid #4ade80; }
  tr.r-diff td:first-child { border-left: 3px solid #f87171; }
  tr.r-miss td:first-child { border-left: 3px solid #fbbf24; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; }
  .b-match { background: rgba(74,222,128,.15); color: #4ade80; }
  .b-diff { background: rgba(248,113,113,.15); color: #f87171; }
  .b-miss { background: rgba(251,191,36,.15); color: #fbbf24; }
  .cell-diff { background: rgba(248,113,113,.12); color: #f87171; font-weight: 700; }
  .cell-ok { color: #6b7280; }
  .empty { padding: 60px 20px; text-align: center; color: #555; }
  .empty .ei { font-size: 2.5rem; margin-bottom: 12px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }
  @media (max-width: 900px) { .input-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>Schedule Diff</h1>
  <span class="sub">기획 스케줄 vs 데이터 테이블 스케줄 검증</span>
</div>
<div class="main">
  <div class="input-grid">
    <div class="panel">
      <div class="panel-head"><span class="lbl">기획 (텍스트 입력)</span><span class="badge">PLAN</span></div>
      <div class="panel-body">
        <textarea id="planText" placeholder="기획 내용을 그대로 붙여넣기 하세요.&#10;다양한 스케줄 표현을 자동 인식합니다.&#10;&#10;예시:&#10;MD01_SzA_NamedMonster&#10;Monday, Wednesday, Friday / 22:00&#10;&#10;입장 시간: Wednesday, Friday / 21:00&#10;&#10;월/수/금 00:00~24:00&#10;목 21:30 ~ 23:30"></textarea>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="lbl">데이터 (파일 첨부)</span><span class="badge">DATA</span></div>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone">
          <div class="icon">+</div>
          <div class="txt">파일 드래그 또는 클릭 (최대 100개)</div>
          <div class="txt" style="font-size:.72rem;margin-top:3px;">.xlsx .xls .txt .csv .tsv</div>
        </div>
        <input type="file" id="fileIn" accept=".txt,.csv,.tsv,.tab,.xlsx,.xls" multiple>
        <div class="flist" id="flist"></div>
        <div class="fcnt" id="fcnt"></div>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-go" id="goBtn">검증하기</button>
    <button class="btn btn-reset" id="resetBtn">초기화</button>
    <span id="status" style="font-size:.82rem;color:#666;"></span>
  </div>

  <!-- Parsed preview -->
  <div class="parsed-preview" id="parsedBox" style="display:none;">
    <div class="parsed-head" id="parsedToggle">
      <span>기획에서 추출된 스케줄 (<span id="parsedCnt">0</span>건)</span>
      <span style="font-size:.72rem;color:#888;">클릭하여 접기/펼치기</span>
    </div>
    <div class="parsed-body" id="parsedBody"></div>
  </div>

  <div class="summary" id="summary" style="display:none;">
    <div class="scard c-total"><div class="sv" id="sTotal">0</div><div class="sl">전체</div></div>
    <div class="scard c-match"><div class="sv" id="sMatch">0</div><div class="sl">스케줄 일치</div></div>
    <div class="scard c-diff"><div class="sv" id="sDiff">0</div><div class="sl">스케줄 불일치</div></div>
    <div class="scard c-miss"><div class="sv" id="sMiss">0</div><div class="sl">데이터 없음</div></div>
  </div>

  <div class="filters" id="filters" style="display:none;">
    <button class="fbtn on" data-f="all">전체</button>
    <button class="fbtn" data-f="diff">불일치</button>
    <button class="fbtn" data-f="miss">데이터 없음</button>
    <button class="fbtn" data-f="match">일치</button>
  </div>

  <div class="rtable-wrap" id="tableWrap" style="display:none;">
    <div class="rtable-scroll">
      <table>
        <thead><tr><th>#</th><th>상태</th><th>식별자</th><th>기획 스케줄</th><th>데이터 스케줄</th><th>비교 상세</th><th>기간</th><th>파일 위치</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty" id="emptyEl">
    <div class="ei">||</div>
    <div>기획 텍스트와 데이터 파일을 입력한 후<br>"검증하기"를 눌러주세요.</div>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
(() => {
  const $plan = document.getElementById('planText');
  const $fileIn = document.getElementById('fileIn');
  const $drop = document.getElementById('dropZone');
  const $flist = document.getElementById('flist');
  const $fcnt = document.getElementById('fcnt');
  const $go = document.getElementById('goBtn');
  const $reset = document.getElementById('resetBtn');
  const $status = document.getElementById('status');
  const $summary = document.getElementById('summary');
  const $filters = document.getElementById('filters');
  const $tableWrap = document.getElementById('tableWrap');
  const $tbody = document.getElementById('tbody');
  const $empty = document.getElementById('emptyEl');
  const $parsedBox = document.getElementById('parsedBox');
  const $parsedBody = document.getElementById('parsedBody');
  const $parsedCnt = document.getElementById('parsedCnt');
  const $parsedToggle = document.getElementById('parsedToggle');

  const MAX = 100;
  let files = [];
  let results = [];

  // ═══ File Upload ═══
  $drop.addEventListener('click', () => $fileIn.click());
  $drop.addEventListener('dragover', e => { e.preventDefault(); $drop.classList.add('dragover'); });
  $drop.addEventListener('dragleave', () => $drop.classList.remove('dragover'));
  $drop.addEventListener('drop', e => { e.preventDefault(); $drop.classList.remove('dragover'); if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
  $fileIn.addEventListener('change', () => { if ($fileIn.files.length) addFiles($fileIn.files); $fileIn.value = ''; });

  function addFiles(fl) {
    const rem = MAX - files.length;
    if (rem <= 0) { alert(`최대 ${MAX}개`); return; }
    const arr = Array.from(fl).slice(0, rem);
    if (fl.length > rem) alert(`${fl.length - rem}개 무시됨`);
    let done = 0;
    arr.forEach(f => {
      if (/\.(xlsx|xls)$/i.test(f.name)) {
        const r = new FileReader();
        r.onload = e => {
          try {
            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
            wb.SheetNames.forEach(sn => {
              const tsv = XLSX.utils.sheet_to_csv(wb.Sheets[sn], { FS: '\t', RS: '\n', blankrows: false, dateNF: 'yyyy-mm-dd hh:mm:ss' });
              if (tsv.trim()) files.push({ name: wb.SheetNames.length > 1 ? `${f.name} [${sn}]` : f.name, size: f.size, content: tsv });
            });
          } catch (err) { alert(`Excel 오류: ${f.name}`); }
          if (++done === arr.length) renderFiles();
        };
        r.readAsArrayBuffer(f);
      } else {
        const r = new FileReader();
        r.onload = e => { files.push({ name: f.name, size: f.size, content: e.target.result }); if (++done === arr.length) renderFiles(); };
        r.readAsText(f, 'UTF-8');
      }
    });
  }
  function renderFiles() {
    $flist.innerHTML = files.map((f, i) => `<div class="fitem"><span class="fn" title="${esc(f.name)}">${esc(f.name)}</span><span class="fs">${fmtSz(f.size)}</span><button class="fx" data-i="${i}">x</button></div>`).join('');
    $fcnt.textContent = files.length ? `${files.length} / ${MAX}` : '';
  }
  $flist.addEventListener('click', e => { const b = e.target.closest('.fx'); if (b) { files.splice(+b.dataset.i, 1); renderFiles(); } });
  function fmtSz(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

  // ═══ Data Index ═══
  function buildIndex() {
    const idx = new Map();
    files.forEach(f => {
      const lines = f.content.replace(/\r\n?/g, '\n').split('\n').filter(l => l.trim());
      const dlm = detectDlm(f.content);
      const headerRow = lines.length ? lines[0].split(dlm).map(c => c.trim()) : [];
      lines.forEach((line, ri) => {
        const row = line.split(dlm).map(c => c.trim());
        row.forEach(cell => {
          if (!cell) return;
          if (!idx.has(cell)) idx.set(cell, []);
          idx.get(cell).push({ fileName: f.name, rowIdx: ri, row, headerRow });
        });
      });
    });
    return idx;
  }
  function detectDlm(t) { const l = t.split('\n')[0]||''; return (l.match(/\t/g)||[]).length >= (l.match(/,/g)||[]).length ? '\t' : ','; }

  // ═══ Schedule Parser (flexible, multi-format) ═══
  const EN_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday','Everyday'];
  const KR_TO_EN = { '월':'Monday','화':'Tuesday','수':'Wednesday','목':'Thursday','금':'Friday','토':'Saturday','일':'Sunday' };
  const KR_DAY_CHARS = Object.keys(KR_TO_EN); // 월화수목금토일

  // Try to extract a schedule from a single line. Returns {days:[], hour, min, raw} or null.
  function tryParseSchedule(line) {
    const trimmed = line.trim();
    if (!trimmed || trimmed === '상시') return null;

    // Remove common prefixes
    let s = trimmed
      .replace(/^입장\s*시간\s*[:：]\s*/i, '')
      .replace(/^입장\s*가능\s*시간\s*[:：]?\s*/i, '')
      .trim();
    if (!s || s === '상시') return null;

    // ── Pattern A: English days ──
    // "Monday, Wednesday, Friday / 22:00"
    // "Sunday 22:00"
    // "Everyday / 22:00"
    // "Wednesday, Friday / 21:00"
    const reEn = new RegExp(
      `^((?:${EN_DAYS.join('|')})(?:\\s*[,、]\\s*(?:${EN_DAYS.join('|')}))*)` +
      `\\s*[/\\s]\\s*(\\d{1,2}):(\\d{2})(?::(\\d{2}))?`
    );
    const mEn = s.match(reEn);
    if (mEn) {
      const days = mEn[1].split(/\s*[,、]\s*/);
      return { days, hour: mEn[2], min: mEn[3], raw: trimmed };
    }

    // ── Pattern B: Korean days ──
    // "월/수/금 00:00~24:00"  → days=월,수,금, time from first time
    // "목 21:30 ~ 23:30"
    // "월, 수, 금 22:00"
    const reKr = new RegExp(
      `^([${KR_DAY_CHARS.join('')}])(?:\\s*[/,、\\s]\\s*([${KR_DAY_CHARS.join('')}]))*` +
      `(?:\\s*[/,、\\s]\\s*([${KR_DAY_CHARS.join('')}]))*` +
      `(?:\\s*[/,、\\s]\\s*([${KR_DAY_CHARS.join('')}]))*` +
      `\\s+(\\d{1,2}):(\\d{2})`
    );
    const mKr = s.match(reKr);
    if (mKr) {
      // Extract all Korean day characters from the day portion
      const dayPart = s.split(/\d{1,2}:\d{2}/)[0];
      const krDays = [...dayPart.matchAll(new RegExp(`[${KR_DAY_CHARS.join('')}]`, 'g'))].map(m => KR_TO_EN[m[0]]).filter(Boolean);
      if (krDays.length > 0) {
        const timePart = s.match(/(\d{1,2}):(\d{2})/);
        return { days: krDays, hour: timePart[1], min: timePart[2], raw: trimmed };
      }
    }

    // ── Pattern C: Just time with known context (fallback) ──
    // If line contains day names anywhere + a time
    const anyEnDay = EN_DAYS.filter(d => s.includes(d));
    const timeMatch = s.match(/(\d{1,2}):(\d{2})/);
    if (anyEnDay.length > 0 && timeMatch) {
      return { days: anyEnDay, hour: timeMatch[1], min: timeMatch[2], raw: trimmed };
    }

    // Korean days anywhere in line
    const anyKrDay = KR_DAY_CHARS.filter(d => s.includes(d)).map(d => KR_TO_EN[d]);
    if (anyKrDay.length > 0 && timeMatch) {
      return { days: anyKrDay, hour: timeMatch[1], min: timeMatch[2], raw: trimmed };
    }

    return null;
  }

  // ═══ Plan Parser: extract (id, schedule) pairs ═══
  function extractIds(line) {
    const ids = [];
    const RE = /([A-Za-z][A-Za-z0-9]*(?:_[A-Za-z0-9]+)+)(?:~(\d+))?/g;
    let m;
    while ((m = RE.exec(line)) !== null) {
      const base = m[1];
      if (base.length < 4 || EN_DAYS.includes(base)) continue;
      if (m[2]) {
        // Range: Map_MD03_01_01~04 → 01,02,03,04
        const lu = base.lastIndexOf('_');
        const prefix = base.substring(0, lu + 1);
        const startStr = base.substring(lu + 1);
        const startN = parseInt(startStr, 10);
        const endN = parseInt(m[2], 10);
        const pad = startStr.length;
        for (let n = startN; n <= endN; n++) ids.push(prefix + String(n).padStart(pad, '0'));
      } else {
        ids.push(base);
      }
    }
    return ids;
  }

  function parsePlan(text) {
    const lines = text.split('\n');
    const items = []; // {id, schedule}
    let pendingIds = [];
    let blankCount = 0;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();

      // Blank lines: 2+ consecutive = section break → clear pending
      if (!line) {
        blankCount++;
        if (blankCount >= 2) pendingIds = [];
        continue;
      }
      blankCount = 0;

      // Skip table markers <NpcSpawn>, <Npc>, etc
      if (/^<[A-Za-z]/.test(line) && line.endsWith('>')) continue;

      // Try parse schedule from this line
      const sched = tryParseSchedule(line);

      // Also extract IDs from this line (with range expansion)
      const ids = extractIds(line);

      if (sched && pendingIds.length > 0) {
        // Schedule found → assign to all pending IDs
        pendingIds.forEach(pid => items.push({ id: pid, schedule: sched }));
        pendingIds = [];
        // If this line also has IDs + schedule on same line, those IDs get this schedule too
        if (ids.length > 0) {
          ids.forEach(id => {
            if (!items.find(it => it.id === id && it.schedule.raw === sched.raw)) {
              items.push({ id, schedule: sched });
            }
          });
        }
        continue;
      }

      if (sched && ids.length > 0) {
        // Line has both IDs and schedule
        ids.forEach(id => items.push({ id, schedule: sched }));
        continue;
      }

      if (sched && pendingIds.length === 0) {
        // Schedule without IDs - might be "입장 시간" line for a previously mentioned section
        // Look backward for nearest IDs
        for (let j = i - 1; j >= Math.max(0, i - 20); j--) {
          const prev = lines[j].trim();
          if (!prev) continue;
          const prevIds = extractIds(prev);
          if (prevIds.length > 0) {
            prevIds.forEach(id => items.push({ id, schedule: sched }));
            break;
          }
        }
        continue;
      }

      if (ids.length > 0 && !sched) {
        // IDs without schedule → add to pending, look ahead for schedule
        pendingIds.push(...ids);

        // Peek ahead for schedule within next few lines
        let foundAhead = false;
        let bk = 0;
        for (let j = i + 1; j < Math.min(i + 15, lines.length); j++) {
          const next = lines[j].trim();
          if (!next) { bk++; if (bk >= 3) break; continue; }
          bk = 0;
          const nextSched = tryParseSchedule(next);
          if (nextSched) { foundAhead = true; break; }
          // If next line has more IDs, they join the pending group
          const nextIds = extractIds(next);
          if (nextIds.length > 0) continue;
          // Context lines (Korean text, date ranges, etc.) — keep looking
          if (/[가-힣]/.test(next) || /\d{4}-\d{2}-\d{2}/.test(next)) continue;
          break;
        }
        if (!foundAhead) pendingIds = []; // No schedule ahead, these IDs are not schedule-relevant
      }
    }

    // Deduplicate
    const seen = new Set();
    return items.filter(it => {
      const key = it.id + '|' + it.schedule.raw;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
  }

  // ═══ Data Row Schedule Extraction ═══
  function getDataSchedule(row, headerRow) {
    const scheds = [];

    // Method 1: Header-based (DayOfWeek#N / Hours#N / Minutes#N columns)
    const hFind = (base, n) => headerRow.findIndex(h => new RegExp(base + '\\s*#?\\s*' + n + '\\s*$', 'i').test(h.trim()));
    if (headerRow && headerRow.length === row.length) {
      for (let n = 1; n <= 20; n++) {
        const dayCol = hFind('DayOfWeek', n);
        const hrCol = hFind('Hours?', n);
        const minCol = hFind('Minutes?', n);
        if (dayCol < 0) break;
        const dayVal = row[dayCol];
        if (!dayVal || dayVal === '0' || dayVal === '-' || dayVal === '') continue;
        // Day may be English name or numeric enum — convert numeric if needed
        let dayName = dayVal;
        const dayNum = parseInt(dayVal, 10);
        if (!isNaN(dayNum) && !EN_DAYS.includes(dayVal)) {
          const numMap = { 0:'Sunday', 1:'Monday', 2:'Tuesday', 3:'Wednesday', 4:'Thursday', 5:'Friday', 6:'Saturday', 7:'Everyday' };
          dayName = numMap[dayNum] || dayVal;
        }
        if (EN_DAYS.includes(dayName)) {
          scheds.push({ day: dayName, hour: String(row[hrCol] || '0'), min: String(row[minCol] || '0') });
        }
      }
      if (scheds.length) return scheds;
    }

    // Method 2: Scan-based (find English day names directly in row cells)
    for (let i = 0; i < row.length; i++) {
      if (EN_DAYS.includes(row[i])) {
        scheds.push({ day: row[i], hour: String(row[i+1]||'0'), min: String(row[i+2]||'0') });
        i += 2;
      }
    }
    return scheds;
  }
  function fmtDataSched(ss) {
    if (!ss.length) return '(스케줄 컬럼 없음)';
    return ss.map(s => `${s.day} / ${s.hour}:${String(s.min).padStart(2,'0')}`).join(', ');
  }

  // ═══ Date Formatting (UTC+9 / KST) ═══
  const KR_DAYNAMES = ['일','월','화','수','목','금','토'];
  function fmtKSTDate(val) {
    if (!val || val === '-' || val === '0') return '';
    let d;
    // Try date string (2024-01-14 12:00:00)
    if (typeof val === 'string' && /\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(val)) {
      const s = val.replace(/\//g, '-');
      d = new Date(s.includes('T') ? s : s.replace(' ', 'T'));
    }
    if (!d || isNaN(d.getTime())) {
      // Try Excel serial number
      const serial = parseFloat(val);
      if (!isNaN(serial) && serial > 40000) {
        d = new Date((serial - 25569) * 86400000);
      }
    }
    if (!d || isNaN(d.getTime())) return val;
    // Adjust to UTC+9
    const utc = d.getTime() + d.getTimezoneOffset() * 60000;
    const kst = new Date(utc + 9 * 3600000);
    const Y = kst.getFullYear();
    const M = String(kst.getMonth() + 1).padStart(2, '0');
    const D = String(kst.getDate()).padStart(2, '0');
    const dw = KR_DAYNAMES[kst.getDay()];
    const h = String(kst.getHours()).padStart(2, '0');
    const m = String(kst.getMinutes()).padStart(2, '0');
    const sec = String(kst.getSeconds()).padStart(2, '0');
    return `${Y}-${M}-${D} (${dw}) ${h}:${m}:${sec}`;
  }

  function getPeriod(row, headerRow) {
    if (!headerRow || headerRow.length !== row.length) return '';
    const startCol = headerRow.findIndex(h => /period\s*start|시작/i.test(h.trim()));
    const endCol = headerRow.findIndex(h => /period\s*end|종료/i.test(h.trim()));
    if (startCol < 0 && endCol < 0) return '';
    const s = startCol >= 0 ? fmtKSTDate(row[startCol]) : '';
    const e = endCol >= 0 ? fmtKSTDate(row[endCol]) : '';
    if (s && e) return `${s} ~ ${e}`;
    return s || e;
  }

  // ═══ Compare One ═══
  function compareOne(expected, dataRow, headerRow) {
    const ds = getDataSchedule(dataRow, headerRow);
    if (!ds.length) return { status: 'diff', detail: '데이터 행에 스케줄 컬럼 없음', dataRaw: '(없음)' };

    const expH = String(parseInt(expected.hour));
    const expM = String(parseInt(expected.min));
    const diffs = [];

    expected.days.forEach(ed => {
      const m = ds.find(d => d.day === ed);
      if (!m) { diffs.push(`${ed}: 데이터에 없음`); return; }
      const dH = String(parseInt(m.hour));
      const dM = String(parseInt(m.min));
      if (dH !== expH || dM !== expM) diffs.push(`${ed}: 기획 ${expH}:${expM.padStart(2,'0')} vs 데이터 ${dH}:${dM.padStart(2,'0')}`);
    });

    ds.forEach(d => { if (!expected.days.includes(d.day)) diffs.push(`${d.day}: 기획에 없는 추가 스케줄`); });

    const dataRaw = fmtDataSched(ds);
    return diffs.length ? { status: 'diff', detail: diffs.join(' | '), dataRaw } : { status: 'match', detail: '일치', dataRaw };
  }

  // ═══ Main ═══
  function run() {
    if (!$plan.value.trim()) { $status.textContent = '기획 텍스트를 입력하세요.'; $status.style.color = '#f87171'; return; }
    if (!files.length) { $status.textContent = '데이터 파일을 첨부하세요.'; $status.style.color = '#f87171'; return; }

    const idx = buildIndex();
    const items = parsePlan($plan.value);

    // Show parsed preview
    $parsedCnt.textContent = items.length;
    $parsedBody.innerHTML = items.map(it =>
      `<div class="parsed-row"><span class="pid">${esc(it.id)}</span><span class="psch">${esc(it.schedule.raw)} → ${it.schedule.days.join(', ')} / ${it.schedule.hour}:${it.schedule.min.padStart(2,'0')}</span></div>`
    ).join('');
    $parsedBox.style.display = 'block';
    $parsedBody.classList.remove('collapsed');

    if (!items.length) {
      $status.textContent = '기획에서 스케줄 정보를 찾지 못했습니다.';
      $status.style.color = '#fbbf24';
      $summary.style.display = 'none'; $filters.style.display = 'none'; $tableWrap.style.display = 'none';
      return;
    }

    let nM = 0, nD = 0, nX = 0;
    results = items.map(it => {
      const hits = idx.get(it.id);
      if (!hits || !hits.length) { nX++; return { ...it, found: false, cmp: null, hit: null }; }
      // Try all hits — prefer match > has-schedule > first
      let bestHit = hits[0], bestCmp = compareOne(it.schedule, hits[0].row, hits[0].headerRow);
      for (let h = 1; h < hits.length && bestCmp.status !== 'match'; h++) {
        const c = compareOne(it.schedule, hits[h].row, hits[h].headerRow);
        if (c.status === 'match' || (bestCmp.dataRaw === '(없음)' && c.dataRaw !== '(없음)')) {
          bestHit = hits[h]; bestCmp = c;
        }
      }
      // Skip items where no hit has schedule data (비교 불가 → 결과에서 제외)
      if (bestCmp.dataRaw === '(없음)') return null;
      bestCmp.status === 'match' ? nM++ : nD++;
      return { ...it, found: true, cmp: bestCmp, hit: bestHit };
    }).filter(r => r !== null);

    document.getElementById('sTotal').textContent = results.length;
    document.getElementById('sMatch').textContent = nM;
    document.getElementById('sDiff').textContent = nD;
    document.getElementById('sMiss').textContent = nX;

    $summary.style.display = 'flex'; $filters.style.display = 'flex';
    $tableWrap.style.display = 'block'; $empty.style.display = 'none';
    $status.textContent = `검증 완료: ${results.length}개 스케줄 항목`;
    $status.style.color = '#4ade80';
    render('all');
  }

  function render(filter) {
    let list = results;
    if (filter === 'diff') list = list.filter(r => r.found && r.cmp && r.cmp.status === 'diff');
    else if (filter === 'miss') list = list.filter(r => !r.found);
    else if (filter === 'match') list = list.filter(r => r.found && r.cmp && r.cmp.status === 'match');

    if (!list.length) { $tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px;color:#555;">해당 결과 없음</td></tr>`; return; }

    $tbody.innerHTML = list.map((r, i) => {
      let cls, badge;
      if (!r.found) { cls = 'r-miss'; badge = '<span class="badge b-miss">데이터 없음</span>'; }
      else if (r.cmp.status === 'match') { cls = 'r-match'; badge = '<span class="badge b-match">일치</span>'; }
      else { cls = 'r-diff'; badge = '<span class="badge b-diff">불일치</span>'; }

      const planSch = `${r.schedule.days.join(', ')} / ${r.schedule.hour}:${r.schedule.min.padStart(2,'0')}`;
      const dataSch = r.found ? esc(r.cmp.dataRaw) : '-';
      const detail = r.found ? esc(r.cmp.detail) : `"${esc(r.id)}" 미발견`;
      const loc = r.hit ? `${esc(r.hit.fileName)} (Row ${r.hit.rowIdx + 1})` : '-';

      const planCls = !r.found ? 'cell-diff' : r.cmp.status === 'diff' ? 'cell-diff' : 'cell-ok';
      const dataCls = !r.found ? '' : r.cmp.status === 'diff' ? 'cell-diff' : 'cell-ok';
      const detCls = (!r.found || r.cmp.status === 'diff') ? 'cell-diff' : 'cell-ok';

      const period = r.hit ? esc(getPeriod(r.hit.row, r.hit.headerRow)) : '-';

      return `<tr class="${cls}"><td>${i+1}</td><td>${badge}</td><td style="font-weight:700;">${esc(r.id)}</td><td class="${planCls}">${esc(planSch)}</td><td class="${dataCls}">${dataSch}</td><td class="${detCls}" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;" title="${detail}">${detail}</td><td style="font-size:.72rem;color:#c084fc;white-space:nowrap;">${period || '-'}</td><td style="color:#667eea;font-size:.72rem;">${loc}</td></tr>`;
    }).join('');
  }

  // ═══ Events ═══
  $go.addEventListener('click', run);
  $reset.addEventListener('click', () => {
    $plan.value = ''; files = []; renderFiles();
    $summary.style.display = 'none'; $filters.style.display = 'none';
    $tableWrap.style.display = 'none'; $empty.style.display = 'block';
    $parsedBox.style.display = 'none';
    $status.textContent = ''; results = [];
  });
  document.querySelectorAll('.fbtn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); render(b.dataset.f);
  }));
  $parsedToggle.addEventListener('click', () => $parsedBody.classList.toggle('collapsed'));
  document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run(); });

  function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>
</body>
</html>
